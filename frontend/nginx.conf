server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Safe to always send; browsers only enforce HSTS over HTTPS.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  # style-src needs 'unsafe-inline' for MUI's emotion runtime, which injects
  # <style> tags without a nonce -- there's no nonce/hash wiring for that
  # today, so this is a known, deliberate compromise (see docs/security.md).
  # connect-src matches this app's current effective default API origin
  # (frontend/src/api/client.ts's VITE_API_BASE_URL fallback) -- the
  # docker-compose `environment: VITE_API_BASE_URL` on this container is
  # actually a no-op today since Vite only reads that var at build time, not
  # container runtime; revisit both together if a real prod deployment needs
  # a different API origin baked in.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://localhost:8000; frame-ancestors 'none'" always;

  location / {
    try_files $uri /index.html;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
