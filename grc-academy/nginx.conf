server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Safe to always send; browsers only enforce HSTS over HTTPS.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  # style-src needs 'unsafe-inline' for MUI's emotion runtime, which injects
  # <style> tags without a nonce. No API calls exist in this app (content is
  # bundled statically, progress lives in localStorage), so connect-src is
  # limited to 'self'.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;

  location / {
    try_files $uri /index.html;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
