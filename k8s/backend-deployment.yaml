# /health has no database check (see docs/deployment.md's "Health checks"
# section) -- it only confirms the process is up and configured. That's
# still enough for a liveness probe (restart a wedged process) and a
# reasonable readiness probe (don't route traffic to a pod that hasn't
# finished starting), but it will NOT catch "process is up but the database
# is unreachable" the way a real DB-aware health check would.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: grc-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/grc-backend:latest # replace with your built+pushed image
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: grc-platform
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
