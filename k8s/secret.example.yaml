# Template only -- DO NOT apply this file as-is or commit it with real values.
# Copy it to secret.yaml (already .gitignore'd -- see below), fill in real
# values, and apply that instead. `stringData` is plaintext-in, base64-out;
# Kubernetes Secrets are base64-encoded at rest, NOT encrypted, unless your
# cluster has encryption-at-rest configured for the Secrets resource type.
#
# docs/deployment.md's stated K8s priority #1 is externalizing secrets into a
# real secrets manager instead of this. That's genuinely a separate piece of
# work -- it means picking a concrete mechanism (External Secrets Operator
# pulling from AWS Secrets Manager/GCP Secret Manager/Azure Key Vault/Vault,
# or a cloud-native CSI secrets-store driver) and wiring it to your specific
# cloud provider, none of which can be drafted generically without knowing
# which cloud/vault this actually deploys to. This raw Secret is the
# stopgap that lets the rest of these manifests (which reference
# `backend-secrets` by name via envFrom) work today; swap the Secret's
# *source* later without touching any Deployment.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: grc-platform
type: Opaque
stringData:
  # 32+ random bytes, e.g.: python -c "import secrets; print(secrets.token_urlsafe(32))"
  SECRET_KEY: "REPLACE_ME_GENERATE_A_REAL_SECRET_KEY"
  DATABASE_URL: "postgresql+psycopg://grc:REPLACE_ME@postgres:5432/grc_platform"
  REDIS_URL: "redis://redis:6379/0"
  OPENAI_API_KEY: ""
  AZURE_OPENAI_ENDPOINT: ""
  AZURE_OPENAI_API_KEY: ""
  AZURE_OPENAI_DEPLOYMENT: ""
---
# Only needed if you deploy postgres.yaml's in-cluster Postgres (see that
# file's own header comment on why a managed Postgres is preferred instead).
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: grc-platform
type: Opaque
stringData:
  POSTGRES_DB: "grc_platform"
  POSTGRES_USER: "grc"
  POSTGRES_PASSWORD: "REPLACE_ME_MATCH_DATABASE_URL_ABOVE"
