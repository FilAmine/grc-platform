# In-cluster Redis, mirroring docker-compose.yml's redis service (used for
# rate limiting -- backend/app/core/rate_limit.py -- and as the Celery
# broker/result backend -- backend/app/core/celery_app.py). Both call sites
# already fail open / retry on a missing Redis, so this being a single
# non-HA replica is a real but accepted tradeoff, not an oversight.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: grc-platform
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: grc-platform
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
