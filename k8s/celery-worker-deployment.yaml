apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: grc-platform
spec:
  replicas: 2 # safe to scale -- workers pull from a shared Redis queue
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: ghcr.io/your-org/grc-backend:latest # replace with your built+pushed image; same image as backend
          command: ["celery", "-A", "backend.app.core.celery_app", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - backend.app.core.celery_app
                - inspect
                - ping
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
