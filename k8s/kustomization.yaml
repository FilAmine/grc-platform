# secret.yaml is intentionally NOT listed here: it's gitignored (real
# credentials shouldn't be committed) and doesn't exist until you copy it
# from secret.example.yaml and fill in real values. Apply it separately --
# see k8s/README.md.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: grc-platform
resources:
  - namespace.yaml
  - configmap.yaml
  - postgres.yaml
  - redis.yaml
  - backend-deployment.yaml
  - celery-worker-deployment.yaml
  - celery-beat-deployment.yaml
  - frontend-deployment.yaml
  - ingress.yaml
  # migration-job.yaml is deliberately excluded too -- it needs a
  # delete-then-apply-then-wait sequence on every deploy (Job specs are
  # immutable), not a plain `kubectl apply -k`. See k8s/README.md.
