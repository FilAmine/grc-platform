# In-cluster Postgres for dev/test parity with docker-compose.yml only.
# docs/deployment.md already recommends a managed, backed-up Postgres
# instance for anything real -- that guidance applies doubly in Kubernetes,
# where a StatefulSet's PVC is not itself a backup strategy. If you have a
# managed database, skip this file entirely and point DATABASE_URL (in
# secret.example.yaml) at it instead.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: grc-platform
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secrets
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 15
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: grc-platform
spec:
  clusterIP: None # headless -- StatefulSet pods are addressed individually
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
