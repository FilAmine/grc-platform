name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint, migrate, test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: grc_platform
          POSTGRES_USER: grc
          POSTGRES_PASSWORD: grc_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U grc -d grc_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://grc:grc_password@localhost:5432/grc_platform
      SECRET_KEY: ci-test-secret-key-not-for-production-use
      AI_PROVIDER: echo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check backend

      - name: Apply migrations against Postgres
        run: alembic upgrade head

      - name: Run tests with coverage
        run: pytest backend/tests -q --cov=backend/app --cov-report=term-missing --cov-fail-under=80

  frontend:
    name: Frontend (typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -b

      - name: Build
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t grc-backend:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t grc-frontend:ci frontend
