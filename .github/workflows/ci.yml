name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint, migrate, test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: grc_platform
          POSTGRES_USER: grc
          POSTGRES_PASSWORD: grc_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U grc -d grc_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://grc:grc_password@localhost:5432/grc_platform
      SECRET_KEY: ci-test-secret-key-not-for-production-use
      AI_PROVIDER: echo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check backend

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2026-1325
        # fastapi>=0.133.0 (pulling starlette>=1.0.1) fixed every previously-ignored
        # starlette advisory -- see docs/roadmap.md. The one remaining ignore is
        # ecdsa: no fix available upstream; verified inapplicable -- see
        # docs/security.md's dependency scanning section for why.

      - name: Apply migrations against Postgres
        run: alembic upgrade head

      - name: Run tests with coverage
        run: pytest backend/tests -q --cov=backend/app --cov-report=term-missing --cov-fail-under=80

  frontend:
    name: Frontend (typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dependency vulnerability scan (npm audit)
        # --omit=dev: the only two current findings (vite, esbuild) are dev
        # server/build-tool-only issues with no production exposure -- nginx
        # serves the pre-built static output, no vite/esbuild code ever runs
        # there. The fix (vite 8.x) is a breaking change that broke MUI icon
        # rendering when tried locally; see docs/security.md.
        run: npm audit --omit=dev --audit-level=high

      - name: Typecheck
        run: npx tsc -b

      - name: Build
        run: npm run build

  grc-academy:
    name: GRC Academy (lint, typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: grc-academy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: grc-academy/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dependency vulnerability scan (npm audit)
        # --omit=dev: the only current findings (vite, esbuild) are dev
        # server/build-tool-only issues with no production exposure -- nginx
        # serves the pre-built static output, no vite/esbuild code ever runs
        # there. Same rationale as frontend/'s CI job.
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc -b

      - name: Build
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend, grc-academy]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t grc-backend:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t grc-frontend:ci frontend

      - name: Build grc-academy image
        run: docker build -f grc-academy/Dockerfile -t grc-academy:ci grc-academy
