x-backend-env: &backend-env
  APP_ENV: ${APP_ENV:-local}
  APP_NAME: ${APP_NAME:-GRC Platform}
  API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
  SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
  REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
  BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://grc:grc_password@postgres:5432/grc_platform}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  AI_PROVIDER: ${AI_PROVIDER:-echo}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
  AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
  AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
  AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grc_platform}
      POSTGRES_USER: ${POSTGRES_USER:-grc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grc_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grc} -d ${POSTGRES_DB:-grc_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment: *backend-env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./alembic.ini:/app/alembic.ini
    command: >
      sh -c "alembic upgrade head &&
             uvicorn backend.app.main:app --host 0.0.0.0 --port 8000"

  # Best-effort depends_on only: `backend` has no healthcheck (only
  # postgres/redis do), so `service_started` means "container launched," not
  # "migrations finished" -- a worker task could still race `backend`'s
  # `alembic upgrade head` on a cold start. Not solved here; would need a
  # real healthcheck on `backend` or a separate migration-completion signal.
  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./backend:/app/backend
      - ./alembic.ini:/app/alembic.ini
    command: celery -A backend.app.core.celery_app worker --loglevel=info

  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./backend:/app/backend
      - ./alembic.ini:/app/alembic.ini
    command: celery -A backend.app.core.celery_app beat --loglevel=info

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
