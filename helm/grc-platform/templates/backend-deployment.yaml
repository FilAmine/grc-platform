apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "grc-platform.fullname" . }}-backend
  labels:
    {{- include "grc-platform.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: {{ include "grc-platform.fullname" . }}-backend
  template:
    metadata:
      labels:
        app: {{ include "grc-platform.fullname" . }}-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "grc-platform.fullname" . }}-config
            - secretRef:
                name: {{ include "grc-platform.fullname" . }}-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "grc-platform.fullname" . }}-backend
  labels:
    {{- include "grc-platform.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "grc-platform.fullname" . }}-backend
  ports:
    - port: 8000
      targetPort: 8000
