# Real Kubernetes Secret (base64-at-rest, not encrypted unless your cluster
# has encryption-at-rest enabled for the Secret resource type) -- a
# stopgap, not a real secrets-manager integration; see values.yaml's
# `secrets:` block header and k8s/secret.example.yaml's header for why.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "grc-platform.fullname" . }}-secrets
  labels:
    {{- include "grc-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
  DATABASE_URL: {{ printf "postgresql+psycopg://%s:%s@%s-postgres:5432/%s" .Values.secrets.postgresUser .Values.secrets.postgresPassword (include "grc-platform.fullname" .) .Values.secrets.postgresDb | quote }}
  REDIS_URL: {{ printf "redis://%s-redis:6379/0" (include "grc-platform.fullname" .) | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  AZURE_OPENAI_ENDPOINT: {{ .Values.secrets.azureOpenaiEndpoint | quote }}
  AZURE_OPENAI_API_KEY: {{ .Values.secrets.azureOpenaiApiKey | quote }}
  AZURE_OPENAI_DEPLOYMENT: {{ .Values.secrets.azureOpenaiDeployment | quote }}
---
{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "grc-platform.fullname" . }}-postgres-secrets
  labels:
    {{- include "grc-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.secrets.postgresDb | quote }}
  POSTGRES_USER: {{ .Values.secrets.postgresUser | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
{{- end }}
