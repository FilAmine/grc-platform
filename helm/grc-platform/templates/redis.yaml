{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "grc-platform.fullname" . }}-redis
  labels:
    {{- include "grc-platform.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "grc-platform.fullname" . }}-redis
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "grc-platform.fullname" . }}-redis
  template:
    metadata:
      labels:
        app: {{ include "grc-platform.fullname" . }}-redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.redis.storageClassName }}
        storageClassName: {{ .Values.redis.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "grc-platform.fullname" . }}-redis
  labels:
    {{- include "grc-platform.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app: {{ include "grc-platform.fullname" . }}-redis
  ports:
    - port: 6379
      targetPort: 6379
{{- end }}
